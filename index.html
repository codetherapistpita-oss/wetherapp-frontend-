<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SkyPulse Weather — responsive forecast dashboard with hourly & weekly views. Built by Code Therapist.">
  <title>SkyPulse Weather | Forecast dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app-status" class="app-status" role="status" hidden></div>

  <div class="wrapper">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <form class="search" id="search" aria-label="Search city">
          <input type="text" id="query" placeholder="Search city…" autocomplete="off" />
          <button type="submit" aria-label="Search"><i class="ph ph-magnifying-glass" aria-hidden="true"></i></button>
        </form>
        <div class="weather-icon">
          <img id="icon" src="https://i.ibb.co/rb4rrJL/26.png" width="160" height="160" alt="" />
        </div>
        <div class="temperature">
          <h1 id="temp">—</h1>
          <span class="temp-unit">°C</span>
        </div>
        <div class="date-time">
          <p id="date-time">—</p>
        </div>
        <div class="divider"></div>
        <div class="condition-rain">
          <div class="condition">
            <i class="ph ph-cloud" aria-hidden="true"></i>
            <p id="condition">—</p>
          </div>
          <div class="rain">
            <i class="ph ph-drop" aria-hidden="true"></i>
            <p id="rain">Precip — 0%</p>
          </div>
        </div>
      </div>
      <div class="location">
        <div class="location-icon"><i class="ph ph-map-pin" aria-hidden="true"></i></div>
        <div class="location-text">
          <p id="location">Search or enable API key</p>
        </div>
      </div>
    </aside>

    <main class="main">
      <nav class="toolbar" aria-label="View options">
        <ul class="options">
          <li><button type="button" class="hourly">Today</button></li>
          <li><button type="button" class="week active">Week</button></li>
        </ul>
        <ul class="options units">
          <li><button type="button" class="celcius active" aria-pressed="true">°C</button></li>
          <li><button type="button" class="fahrenheit" aria-pressed="false">°F</button></li>
        </ul>
      </nav>

      <div class="cards forecast-cards" id="weather-cards"></div>

      <section class="highlights" aria-labelledby="highlights-heading">
        <h2 class="heading" id="highlights-heading">Today’s highlights</h2>
        <div class="cards highlight-cards">
          <div class="card2">
            <h3 class="card-heading">UV index</h3>
            <div class="content">
              <p class="uv-index">0</p>
              <p class="uv-text">—</p>
            </div>
          </div>
          <div class="card2">
            <h3 class="card-heading">Wind speed</h3>
            <div class="content">
              <p class="wind-speed">0</p>
              <p>km/h</p>
            </div>
          </div>
          <div class="card2">
            <h3 class="card-heading">Sunrise &amp; sunset</h3>
            <div class="content content-split">
              <p><span class="label">Up</span> <span class="sun-rise">—</span></p>
              <p><span class="label">Down</span> <span class="sun-set">—</span></p>
            </div>
          </div>
          <div class="card2">
            <h3 class="card-heading">Humidity</h3>
            <div class="content">
              <p class="humidity">0</p>
              <p class="humidity-status">—</p>
            </div>
          </div>
          <div class="card2">
            <h3 class="card-heading">Visibility</h3>
            <div class="content">
              <p class="visibilty">0</p>
              <p class="visibilty-status">—</p>
            </div>
          </div>
          <div class="card2">
            <h3 class="card-heading">Wind direction</h3>
            <div class="content">
              <p class="air-quality">0°</p>
              <p class="air-quality-status">—</p>
            </div>
          </div>
        </div>
      </section>

      <p class="credits">SkyPulse Weather — designed &amp; built by <strong>Code Therapist</strong></p>
    </main>
  </div>

  <script src="./weather-config.js"></script>
  <script src="./script.js"></script>
</body>
</html>
